
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis | Neural Chat Bot</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 243, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0a0a20 0%, #000 100%);
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 243, 255, 0.1);
            animation: scanline 6s linear infinite;
            z-index: 10; pointer-events: none;
        }
        @keyframes scanline { from { top: 0%; } to { top: 100%; } }

        #chat-container {
            width: 95%;
            max-width: 500px;
            height: 88vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            position: relative; overflow: hidden;
        }

        header {
            padding: 20px; border-bottom: 1px solid var(--border);
            text-align: center; background: rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; letter-spacing: 5px;
            color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan);
        }

        #chat-box {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none;
        }

        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 15px;
            font-size: 0.95rem; line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(0, 243, 255, 0.05));
            border: 1px solid var(--neon-cyan); border-bottom-right-radius: 2px;
        }

        .jarvis-msg {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.15), rgba(188, 19, 254, 0.05));
            border: 1px solid var(--neon-purple); color: #dcdcdc; border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px; display: flex; gap: 10px;
            background: rgba(0, 0, 0, 0.7); border-top: 1px solid rgba(255,255,255,0.05);
        }

        input {
            flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            padding: 12px 15px; border-radius: 12px; color: white;
            font-family: 'Rajdhani', sans-serif; outline: none;
        }

        .btn {
            width: 45px; height: 45px; border-radius: 12px; border: none;
            cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s;
        }

        .send-btn { background: var(--neon-cyan); color: #000; }
        .mic-btn { background: rgba(188, 19, 254, 0.2); color: var(--neon-purple); border: 1px solid var(--neon-purple); }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 15px currentColor; }

        #thinking {
            padding: 0 20px 10px; font-size: 10px; color: var(--neon-cyan);
            display: none; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="chat-container">
       <header style="display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border); background: rgba(0, 0, 0, 0.5);">
    
    <button onclick="location.href='index.html'" style="background: none; border: none; color: var(--neon-cyan); cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; text-shadow: 0 0 10px var(--neon-cyan);">
        <i class="fas fa-chevron-left"></i>
    </button>

    <div style="flex: 1; text-align: center; margin-right: 30px;">
        <h1 style="font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 4px; color: var(--neon-cyan); margin: 0; text-shadow: 0 0 10px var(--neon-cyan);">NEURAL CORE</h1>
        <p id="status" style="font-size: 8px; color: #555; margin-top: 3px; text-transform: uppercase; letter-spacing: 1px;">Secure Link Established</p>
    </div>

</header>


        <div id="chat-box">
            </div>

        <div id="thinking"><i class="fas fa-sync fa-spin"></i> JARVIS IS PROCESSING...</div>

        <div class="input-area">
            <button class="btn mic-btn" onclick="startVoice()"><i class="fas fa-microphone"></i></button>
            <input type="text" id="user-input" placeholder="Initiate command..." autocomplete="off">
            <button class="btn send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-rlOHW0rznLyl5qZU9mLyrU9JD3qdk8U",
            authDomain: "jarvis-ai-akshay-1c1ed.firebaseapp.com",
            databaseURL: "https://jarvis-ai-akshay-1c1ed-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jarvis-ai-akshay-1c1ed",
            storageBucket: "jarvis-ai-akshay-1c1ed.firebasestorage.app",
            messagingSenderId: "545059680914",
            appId: "1:545059680914:web:308dbb661debd6c0fd6c4b"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let currentUser = null;

        auth.onAuthStateChanged(user => {
            const status = document.getElementById('status');
            const chatBox = document.getElementById('chat-box');
            if (user) {
                currentUser = user;
                status.innerText = "UPLINK STABLE | COMMANDER: " + user.email.split('@')[0].toUpperCase();
                loadHistory();
            } else {
                currentUser = { uid: "guest_akshay" };
                status.innerText = "UPLINK STABLE | GUEST MODE";
                addBubble("Neural pathways online. I am JARVIS. How can I assist you, Sir?", 'jarvis');
            }
        });

        function loadHistory() {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; 
            db.ref(`users/${currentUser.uid}/chat_history`).on('child_added', (snap) => {
                const data = snap.val();
                addBubble(data.text, data.sender === 'user' ? 'user' : 'jarvis');
            });
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            // Step 1: Push to Firebase (Sync with main Jarvis)
            if(currentUser && currentUser.uid !== "guest_akshay") {
                db.ref(`users/${currentUser.uid}/chat_history`).push({
                    text: text, sender: 'user', timestamp: Date.now()
                });
            } else {
                addBubble(text, 'user');
            }

            input.value = '';
            document.getElementById('thinking').style.display = 'block';

            try {
                const snap = await db.ref('system_config/ai_core').once('value');
                const cfg = snap.val();

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + cfg.api_key.trim(),
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin,
                        "X-Title": "Jarvis Neural"
                    },
                    body: JSON.stringify({
                        "model": cfg.model_primary || "google/gemini-2.0-flash-lite-preview-02-05:free",
                        "messages": [{"role": "system", "content": "You are JARVIS. Akshay is your commander."}, {"role": "user", "content": text}]
                    })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error?.message || "Uplink Error");

                const aiReply = data.choices[0].message.content;

                // Step 2: Push AI Response to Firebase
                if(currentUser && currentUser.uid !== "guest_akshay") {
                    db.ref(`users/${currentUser.uid}/chat_history`).push({
                        text: aiReply, sender: 'jarvis', timestamp: Date.now()
                    });
                } else {
                    addBubble(aiReply, 'jarvis');
                }

            } catch (e) {
                addBubble("Sir, " + e.message, 'jarvis');
            } finally {
                document.getElementById('thinking').style.display = 'none';
            }
        }

        function addBubble(text, sender) {
            const chatBox = document.getElementById('chat-box');
            // Duplicate check
            const lastMsg = chatBox.lastElementChild?.innerText;
            if(lastMsg === text) return;

            const div = document.createElement('div');
            div.className = `message ${sender}-msg`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                handleSend();
            };
            recognition.start();
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
